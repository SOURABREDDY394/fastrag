services:
  - type: web
    name: studyrag-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FRONTEND_ORIGINS
        value: https://frontend-beta-nine-exumkm1408.vercel.app,https://frontend-76ihbafug-sourabreddy394s-projects.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: MAX_LARGE_FILE_INDEX_PAGES
        value: 1
      - key: MAX_INDEX_SECONDS
        value: 60
      - key: MAX_INDEX_CHUNKS
        value: 30
      - key: OCR_SCALE
        value: 0.9
      - key: OCR_TIMEOUT_SECONDS
        value: 5
